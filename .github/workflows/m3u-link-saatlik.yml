name: Run m3u_link_saatlik.py script

on:
   workflow_dispatch:  # Manuel olarak çalıştırılabilir
   schedule:
    - cron: "0 */4 * * *"
 
jobs:
  run_base_url_script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Python environment
        uses: actions/setup-python@v3
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install undetected-chromedriver selenium

      - name: Run m3u_link2.py
        run: |
          python m3u_link2.py

      # Ana link dosyasını kontrol ediyoruz
      - name: Check if m3u_link_alındı2.txt is updated
        id: check_update
        run: |
          echo "Checking if m3u_link_alındı2.txt was updated:"
          cat m3u_link_alındı2.txt
          
          OLD_URL=$(cat m3u_link_alındı2.txt)
          NEW_URL=$(python m3u_link2.py)
          
          if [ "$OLD_URL" == "$NEW_URL" ]; then
            echo "URL güncellenmeye gerek yoktur"
            echo "no_update=true" >> $GITHUB_ENV
          else
            echo "URL başarıyla m3u_link_alındı2.txt dosyasına güncellendi"
            echo "no_update=false" >> $GITHUB_ENV
          fi

      # GitHub Actions'a yapılan değişiklikleri commit ediyoruz
      - name: Commit updated m3u_link_alındı2.txt
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          git pull
          if git diff --quiet; then
            echo "No changes detected. Skipping commit."
          else
            git add m3u_link_alındı2.txt
            if [ "${{ env.no_update }}" == "true" ]; then
              git commit -m "Son M3U linklerini güncellenmeye gerek yoktur"
            else
              git commit -m "Son M3U linkleri güncellendi."
            fi
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # gol-m3u-saatlik.yml workflow'unu tetiklemek
      - name: Trigger gol-m3u-saatlik.yml workflow
        if: ${{ env.no_update == 'false' }}  # This ensures it only triggers if the file was updated
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -d '{"ref": "main"}' \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/gol-m3u-saatlik.yml/dispatches
