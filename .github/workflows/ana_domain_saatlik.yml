name: Run Monitor URL Saatlik

on:
  workflow_dispatch:
  schedule:
    - cron: "5 */3 * * *"

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Run ana_domain.py and check redirect
        id: check_redirect
        run: |
          OUTPUT=$(python ana_domain.py)
          echo "Script çıktısı: $OUTPUT"

          if [[ "$OUTPUT" == *"Yönlendirme yok"* ]]; then
            echo "no_update=true" >> $GITHUB_ENV
            echo "Yönlendirme yok. ana_link.txt değişmeyecek."
          else
            echo "$OUTPUT" > ana_link.txt
            echo "no_update=false" >> $GITHUB_ENV
            echo "Yeni domain ana_link.txt dosyasına yazıldı: $OUTPUT"
          fi

      - name: Rebuild m3u_link.txt from ana_link.txt (her zaman)
        run: |
          BASE_URL=$(cat ana_link.txt | sed 's:/*$::')
          echo "$BASE_URL/tv/bein-sports-1/" > m3u_link.txt

          echo "m3u_link.txt güncellendi:"
          cat m3u_link.txt

      - name: Commit updated files if anything changed
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          # Eğer değişiklik varsa commit et
          if git diff --quiet; then
            echo "Değişiklik yok. Commit atlanıyor."
          else
            git add ana_link.txt m3u_link.txt
            git commit -m "Dosyalar güncellendi. m3u_link.txt her zaman yeniden yazıldı."
            git push
          fi

      - name: Trigger m3u-link-saatlik.yml workflow (her durumda tetikle)
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -d '{"ref": "main"}' \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/m3u-link-saatlik.yml/dispatches
