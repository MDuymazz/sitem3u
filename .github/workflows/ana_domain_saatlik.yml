name: Run Monitor URL Saatlik

on:
  workflow_dispatch:
  schedule:
    - cron: "5 */3 * * *"

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Run ana_domain.py and check redirect
        id: check_redirect
        run: |
          OUTPUT=$(python ana_domain.py)
          echo "Script çıktısı: $OUTPUT"

          if [[ "$OUTPUT" == *"Yönlendirme yok"* ]]; then
            echo "no_update=true" >> $GITHUB_ENV
            echo "Yönlendirme yok. ana_link.txt olduğu gibi kalacak."
          else
            echo "$OUTPUT" > ana_link.txt
            echo "no_update=false" >> $GITHUB_ENV
            echo "Yeni domain ana_link.txt dosyasına yazıldı: $OUTPUT"
          fi

      - name: Rebuild m3u_link.txt from ana_link.txt (her durumda)
        run: |
          BASE_URL=$(cat ana_link.txt | sed 's:/*$::')  # sondaki / varsa temizle
          FULL_URL="$BASE_URL/tv/bein-sports-1/"
          echo "$FULL_URL" > m3u_link.txt

          echo "Yeni m3u_link.txt içeriği:"
          cat m3u_link.txt

      - name: Commit updated files (sadece yönlendirme varsa)
        if: env.no_update == 'false'
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          git add ana_link.txt m3u_link.txt
          git commit -m "Yönlendirme bulundu. Domain ve m3u_link güncellendi."
          git push

      - name: Trigger m3u-link-saatlik.yml workflow (sadece yönlendirme varsa)
        if: env.no_update == 'false'
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -d '{"ref": "main"}' \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/m3u-link-saatlik.yml/dispatches
