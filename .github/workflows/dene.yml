name: Run Python Script2s from Private Repo

on:
  workflow_dispatch:          # Manuel tetikleme
  schedule:
    - cron: '15 */21 * * *'   # Her 21 saatte bir çalışır

jobs:
  run-python-scripts:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Public Repository
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'

    - name: Clone Private Repository (Py)
      run: |
        git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/MDuymazz/Py.git private_py

    - name: Install Python dependencies from private repo
      run: |
        pip install -r private_py/requirements.txt

    - name: Run all Python scripts in order
      run: |
        python private_py/ana_domain.py
        python private_py/mac_verileri.py
        python private_py/link_alma.py
        python private_py/m3u_link.py
        python private_py/kod_alma.py
        python private_py/link_hazırlama.py
        python private_py/encode.py
        python private_py/verileri_birlestir.py
        python private_py/txt_to_m3u.py
        python private_py/birlestir.py

    - name: Commit and push updated text files
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add .
        git diff --cached --quiet || (git commit -m "Update text files via workflow" && git push)
